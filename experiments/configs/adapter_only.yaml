# Adapter-only ablation
experiment_name: adapter_only
dataset: isic
data_root: data
sam_checkpoint: checkpoints/sam_vit_b_01ec64.pth
model_type: vit_b
seed: 42

# Core settings
freeze_encoder: true
freeze_decoder: false
use_prompts: false
use_adapters: true
adapter_layers: [8, 9, 10, 11]

# Training
batch_size: 4
num_epochs: 50
learning_rate: 1e-4
weight_decay: 0.01
target_size: [1024, 1024]
num_workers: 4